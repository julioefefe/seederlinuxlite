<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SeederLinux Lite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .bg-login {
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
        }
    </style>
</head>
<body class="bg-login min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-md bg-white rounded-3xl shadow-2xl overflow-hidden">
        <div class="bg-slate-900 p-8 text-center">
            <div class="w-16 h-16 bg-cyan-500 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-slate-900" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-white">SeederLinux <span class="text-cyan-400">Lite</span></h1>
            <p class="text-slate-400 mt-1">Acesso Restrito ao Sistema</p>
        </div>

        <div class="p-8">
            <form id="login-form" class="space-y-6">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">E-mail Corporativo</label>
                    <input type="email" id="email" required placeholder="admin@sistema.local"
                        class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Senha</label>
                    <input type="password" id="password" required placeholder="••••••••"
                        class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 outline-none transition-all">
                </div>
                <button type="submit" id="btn-login"
                    class="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-4 rounded-xl shadow-lg transition-all transform hover:scale-[1.02]">
                    Entrar no Sistema
                </button>
            </form>
            <div id="login-error" class="mt-4 p-3 bg-red-50 text-red-600 text-sm rounded-lg hidden text-center font-medium"></div>
            
            <div class="mt-8 text-center">
                <a href="home.html" class="text-slate-400 hover:text-slate-600 text-sm font-medium transition-all">← Voltar para a Home</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('btn-login');
            const errorDiv = document.getElementById('login-error');

            btn.disabled = true;
            btn.textContent = 'Autenticando...';
            errorDiv.classList.add('hidden');

            try {
                const res = await fetch('../api/auth.php?action=login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('seeder_token', data.token);
                    localStorage.setItem('seeder_user', JSON.stringify(data.user));
                    window.location.href = 'index.html';
                } else {
                    errorDiv.textContent = data.error || 'Credenciais inválidas';
                    errorDiv.classList.remove('hidden');
                    btn.textContent = 'Entrar no Sistema';
                    btn.disabled = false;
                }
            } catch (err) {
                errorDiv.textContent = 'Erro de conexão com o servidor';
                errorDiv.classList.remove('hidden');
                btn.textContent = 'Entrar no Sistema';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
