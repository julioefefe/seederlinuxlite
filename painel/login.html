<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeederLinux Lite - Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background-color: #f4f4f4; }
        article { width: 100%; max-width: 400px; }
    </style>
</head>
<body>
    <article>
        <header>
            <strong>SeederLinux Lite</strong>
            <p>Acesso ao Sistema</p>
        </header>
        <form id="login-form">
            <label for="email">E-mail</label>
            <input type="email" id="email" name="email" placeholder="admin@sistema.local" required>
            
            <label for="password">Senha</label>
            <input type="password" id="password" name="password" required>
            
            <button type="submit" id="btn-login">Entrar</button>
        </form>
        <div id="login-error" style="color: red; margin-top: 1rem; display: none;"></div>
    </article>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('btn-login');
            const errorDiv = document.getElementById('login-error');

            btn.disabled = true;
            errorDiv.style.display = 'none';

            try {
                const res = await fetch('../api/auth.php?action=login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('seeder_token', data.token);
                    localStorage.setItem('seeder_user', JSON.stringify(data.user));
                    window.location.href = 'index.html';
                } else {
                    errorDiv.textContent = data.error || 'Erro ao entrar';
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                errorDiv.textContent = 'Erro de conexão';
                errorDiv.style.display = 'block';
            } finally {
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
