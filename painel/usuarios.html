<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeederLinux Lite - Usuários</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
</head>
<body>
    <main class="container">
        <header style="display: flex; justify-content: space-between; align-items: center;">
            <div>
                <h1>Gestão de Usuários</h1>
                <a href="index.html">Voltar ao Início</a>
            </div>
        </header>

        <section>
            <h3>Novo Usuário</h3>
            <form id="user-form">
                <div class="grid">
                    <input type="text" id="name" placeholder="Nome Completo" required>
                    <input type="email" id="email" placeholder="E-mail" required>
                    <input type="password" id="password" placeholder="Senha" required>
                </div>
                <div class="grid">
                    <select id="role">
                        <option value="operador_om">Operador OM</option>
                        <option value="auditor">Auditor</option>
                        <option value="admin_gap">Admin GAP</option>
                    </select>
                    <input type="number" id="org_id" placeholder="ID da OM (opcional)">
                    <button type="submit">Criar Usuário</button>
                </div>
            </form>
        </section>

        <section>
            <h3>Usuários Cadastrados</h3>
            <table id="users-table">
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>E-mail</th>
                        <th>Role</th>
                        <th>OM</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </section>
    </main>

    <script>
        const token = localStorage.getItem('seeder_token');
        if (!token) window.location.href = 'login.html';

        const authFetch = (url, options = {}) => {
            options.headers = options.headers || {};
            options.headers['Authorization'] = `Bearer ${token}`;
            return fetch(url, options);
        };

        async function loadUsers() {
            const res = await authFetch('../api/users.php');
            const data = await res.json();
            const tbody = document.querySelector('#users-table tbody');
            tbody.innerHTML = '';
            data.forEach(u => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${u.name}</td>
                    <td>${u.email}</td>
                    <td>${u.role}</td>
                    <td>${u.organization_id || 'Global'}</td>
                    <td><button onclick="deleteUser(${u.id})" class="outline contrast" style="padding: 2px 10px;">Desativar</button></td>
                `;
                tbody.appendChild(tr);
            });
        }

        document.getElementById('user-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                role: document.getElementById('role').value,
                organization_id: document.getElementById('org_id').value || null
            };

            const res = await authFetch('../api/users.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (res.ok) {
                alert('Usuário criado!');
                loadUsers();
            } else {
                const data = await res.json();
                alert('Erro: ' + data.error);
            }
        });

        async function deleteUser(id) {
            if (confirm('Deseja desativar este usuário?')) {
                await authFetch(`../api/users.php?id=${id}`, { method: 'DELETE' });
                loadUsers();
            }
        }

        loadUsers();
    </script>
</body>
</html>
