<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Usuários - SeederLinux Lite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-50 min-h-screen flex">
    <!-- Sidebar -->
    <aside class="w-64 bg-slate-900 text-slate-300 flex flex-col fixed h-full shadow-xl">
        <div class="p-6 flex items-center gap-3 border-b border-slate-800">
            <div class="w-8 h-8 bg-cyan-500 rounded-lg flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-900" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                </svg>
            </div>
            <span class="text-lg font-bold text-white tracking-tight">SeederLinux</span>
        </div>
        <nav class="flex-1 py-6 space-y-1">
            <a href="index.html" class="flex items-center px-6 py-3 hover:bg-slate-800 hover:text-white transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                </svg>
                Painel Principal
            </a>
            <a href="usuarios.html" class="flex items-center px-6 py-3 bg-cyan-500/10 border-l-4 border-cyan-500 text-cyan-500 font-semibold">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
                </svg>
                Usuários
            </a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 ml-64 p-8">
        <header class="mb-10">
            <h2 class="text-3xl font-extrabold text-slate-900">Gestão de Usuários</h2>
            <p class="text-slate-500">Administre os acessos e permissões do sistema.</p>
        </header>

        <div class="grid lg:grid-cols-3 gap-8">
            <!-- Form Card -->
            <div class="bg-white rounded-3xl shadow-sm border border-slate-200 p-8 h-fit">
                <h3 class="font-bold text-slate-900 mb-6">Novo Usuário</h3>
                <form id="user-form" class="space-y-4">
                    <input type="text" id="name" placeholder="Nome Completo" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-cyan-500 outline-none">
                    <input type="email" id="email" placeholder="E-mail" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-cyan-500 outline-none">
                    <input type="password" id="password" placeholder="Senha Temporária" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-cyan-500 outline-none">
                    
                    <select id="role" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-cyan-500 outline-none font-medium">
                        <option value="operador_om">Operador OM</option>
                        <option value="auditor">Auditor</option>
                        <option value="admin_gap">Admin GAP</option>
                    </select>
                    
                    <input type="number" id="org_id" placeholder="ID da OM (opcional)" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-cyan-500 outline-none">
                    
                    <button type="submit" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-4 rounded-xl shadow-lg transition-all">Criar Conta</button>
                </form>
            </div>

            <!-- List Card -->
            <div class="lg:col-span-2 bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 border-b border-slate-100">
                        <tr>
                            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Usuário</th>
                            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Perfil</th>
                            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">OM</th>
                            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="users-table-body" class="divide-y divide-slate-100">
                        <!-- Preenchido via JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const token = localStorage.getItem('seeder_token');
        if (!token) window.location.href = 'login.html';

        const authFetch = (url, options = {}) => {
            options.headers = options.headers || {};
            options.headers['Authorization'] = `Bearer ${token}`;
            return fetch(url, options);
        };

        async function loadUsers() {
            const res = await authFetch('../api/users.php');
            const data = await res.json();
            const tbody = document.getElementById('users-table-body');
            tbody.innerHTML = '';
            data.forEach(u => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50 transition-all";
                tr.innerHTML = `
                    <td class="px-6 py-4">
                        <div class="font-bold text-slate-900">${u.name}</div>
                        <div class="text-xs text-slate-400">${u.email}</div>
                    </td>
                    <td class="px-6 py-4">
                        <span class="px-2 py-1 rounded-full text-[10px] font-bold uppercase ${u.role === 'admin_gap' ? 'bg-indigo-100 text-indigo-600' : 'bg-slate-100 text-slate-600'}">
                            ${u.role.replace('_', ' ')}
                        </span>
                    </td>
                    <td class="px-6 py-4 text-sm font-medium text-slate-600">
                        ${u.organization_id || '<span class="text-slate-300">Global</span>'}
                    </td>
                    <td class="px-6 py-4">
                        <button onclick="deleteUser(${u.id})" class="text-red-500 hover:text-red-700 text-xs font-bold uppercase tracking-wider">Desativar</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        document.getElementById('user-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                role: document.getElementById('role').value,
                organization_id: document.getElementById('org_id').value || null
            };

            const res = await authFetch('../api/users.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (res.ok) {
                alert('Usuário criado com sucesso!');
                loadUsers();
                e.target.reset();
            } else {
                const data = await res.json();
                alert('Erro: ' + data.error);
            }
        });

        async function deleteUser(id) {
            if (confirm('Deseja realmente desativar este usuário?')) {
                await authFetch(`../api/users.php?id=${id}`, { method: 'DELETE' });
                loadUsers();
            }
        }

        loadUsers();
    </script>
</body>
</html>
