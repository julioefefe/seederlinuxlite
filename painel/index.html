<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeederLinux Lite - Painel</title>
    <!-- PicoCSS para estilo limpo e rápido -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
    <style>
        :root { --spacing: 1rem; }
        .container { margin-top: 2rem; }
        .hidden { display: none; }
        .card { padding: 1rem; border: 1px solid #ccc; border-radius: 8px; margin-bottom: 1rem; }
        .script-item { display: flex; align-items: center; gap: 10px; margin-bottom: 5px; }
        .required-missing { color: #d81b60; font-weight: bold; border: 1px solid #d81b60; padding: 2px 5px; border-radius: 4px; }
        .badge { font-size: 0.7rem; padding: 2px 6px; border-radius: 10px; background: #eee; margin-left: 5px; }
    </style>
</head>
<body>
    <main class="container">
        <header style="display: flex; justify-content: space-between; align-items: center;">
            <div>
                <h1>SeederLinux Lite</h1>
                <p>Gerenciamento de Provisionamento Linux</p>
            </div>
            <div id="user-info" style="text-align: right;">
                <span id="user-name">Carregando...</span> <br>
                <small id="user-role" style="text-transform: uppercase; color: #666;"></small> |
                <a href="#" id="btn-logout" style="color: #d81b60;">Sair</a>
            </div>
        </header>
        <nav id="main-nav" class="hidden">
            <ul>
                <li><a href="index.html">Início</a></li>
                <li id="nav-users" class="hidden"><a href="usuarios.html">Usuários</a></li>
            </ul>
        </nav>

        <section id="section-orgs">
            <h3>1. Selecione a Organização (OM)</h3>
            <select id="select-org">
                <option value="">Carregando organizações...</option>
            </select>
        </section>

        <section id="section-details" class="hidden">
            <div class="grid">
                <div>
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <h3>2. Variáveis da OM</h3>
                        <select id="filter-category" style="width: auto; margin: 0;">
                            <option value="">Todas as Categorias</option>
                        </select>
                    </div>
                    <div id="variables-list" class="card">
                        <!-- Preenchido via JS -->
                    </div>
                </div>
                <div>
                    <h3>3. Opções de Deploy</h3>
                    <div class="card">
                        <label for="select-profile">Perfil de Deploy (Opcional):</label>
                        <select id="select-profile">
                            <option value="">-- Selecionar Scripts Manualmente --</option>
                        </select>
                        
                        <div id="manual-scripts">
                            <hr>
                            <label>Scripts Individuais:</label>
                            <div id="scripts-list">
                                <!-- Preenchido via JS -->
                            </div>
                        </div>
                    </div>
                    <button id="btn-generate" class="contrast">Gerar Bundle de Instalação</button>
                </div>
            </div>
        </section>

        <section id="section-result" class="hidden">
            <div class="card" style="background-color: #d4edda; color: #155724;">
                <strong>Sucesso!</strong> Bundle gerado com sucesso.
                <br>
                <a id="link-download" href="#" class="button">Baixar Arquivo .sh</a>
            </div>
        </section>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
