<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel - SeederLinux Lite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .sidebar-active { border-left: 4px solid #22d3ee; background: rgba(34, 211, 238, 0.1); color: #22d3ee; }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex">
    <!-- Sidebar -->
    <aside class="w-64 bg-slate-900 text-slate-300 flex flex-col fixed h-full shadow-xl z-20">
        <div class="p-6 flex items-center gap-3 border-b border-slate-800">
            <div class="w-8 h-8 bg-cyan-500 rounded-lg flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-900" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                </svg>
            </div>
            <span class="text-lg font-bold text-white tracking-tight">SeederLinux</span>
        </div>
        
        <nav class="flex-1 py-6 space-y-1">
            <a href="index.html" class="flex items-center px-6 py-3 sidebar-active transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                </svg>
                Painel Principal
            </a>
            <a id="nav-users" href="usuarios.html" class="flex items-center px-6 py-3 hover:bg-slate-800 hover:text-white transition-all hidden">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
                </svg>
                Usuários
            </a>
        </nav>

        <div class="p-6 border-t border-slate-800">
            <div class="flex items-center gap-3 mb-4">
                <div class="w-10 h-10 bg-slate-700 rounded-full flex items-center justify-center font-bold text-white" id="user-initials">?</div>
                <div class="overflow-hidden">
                    <p class="text-sm font-semibold text-white truncate" id="user-name">Usuário</p>
                    <p class="text-xs text-slate-500 uppercase" id="user-role">Role</p>
                </div>
            </div>
            <button id="btn-logout" class="w-full bg-red-500/10 hover:bg-red-500 text-red-500 hover:text-white py-2 rounded-lg text-sm font-bold transition-all flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                </svg>
                Sair
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 ml-64 p-8">
        <header class="mb-10 flex justify-between items-end">
            <div>
                <h2 class="text-3xl font-extrabold text-slate-900">Provisionamento</h2>
                <p class="text-slate-500">Configure e gere bundles de instalação para as OMs.</p>
            </div>
            <div class="bg-white px-4 py-2 rounded-xl shadow-sm border border-slate-200 flex items-center gap-3">
                <span class="text-sm font-medium text-slate-600">Organização Militar:</span>
                <select id="select-org" class="bg-transparent font-bold text-slate-900 outline-none cursor-pointer">
                    <option value="">Carregando...</option>
                </select>
            </div>
        </header>

        <!-- Seção de Detalhes (Hidden by default) -->
        <div id="section-details" class="hidden space-y-8 animate-in fade-in duration-500">
            <div class="grid lg:grid-cols-2 gap-8">
                <!-- Variáveis Card -->
                <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden flex flex-col h-[600px]">
                    <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                        <h3 class="font-bold text-slate-900 flex items-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-cyan-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            </svg>
                            Variáveis de Configuração
                        </h3>
                        <select id="filter-category" class="text-xs bg-white border border-slate-200 rounded-lg px-2 py-1 outline-none font-medium">
                            <option value="">Todas Categorias</option>
                        </select>
                    </div>
                    <div id="variables-list" class="flex-1 overflow-y-auto custom-scroll p-6">
                        <!-- Preenchido via JS -->
                    </div>
                </div>

                <!-- Scripts e Bundle Card -->
                <div class="space-y-8">
                    <div class="bg-white rounded-3xl shadow-sm border border-slate-200 p-8">
                        <h3 class="font-bold text-slate-900 mb-6 flex items-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-cyan-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                            </svg>
                            Opções de Deploy
                        </h3>
                        
                        <div class="space-y-4">
                            <label class="block">
                                <span class="text-sm font-semibold text-slate-700">Perfil de Deploy</span>
                                <select id="select-profile" class="mt-1 w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-cyan-500 transition-all font-medium">
                                    <option value="">-- Seleção Manual de Scripts --</option>
                                </select>
                            </label>

                            <div id="manual-scripts" class="pt-4">
                                <span class="text-sm font-semibold text-slate-700 mb-3 block">Módulos Individuais</span>
                                <div id="scripts-list" class="grid grid-cols-1 gap-2">
                                    <!-- Preenchido via JS -->
                                </div>
                            </div>

                            <button id="btn-generate" class="w-full bg-cyan-500 hover:bg-cyan-400 text-slate-900 font-bold py-4 rounded-xl shadow-lg transition-all transform hover:scale-[1.02] mt-6">
                                Gerar Bundle de Instalação (.sh)
                            </button>
                        </div>
                    </div>

                    <!-- Resultado Card -->
                    <div id="section-result" class="hidden bg-emerald-500 rounded-3xl p-8 text-white shadow-xl shadow-emerald-500/20 animate-bounce-short">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-white/20 rounded-2xl flex items-center justify-center">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                                </svg>
                            </div>
                            <div>
                                <h4 class="font-bold text-lg">Bundle Gerado!</h4>
                                <p class="text-emerald-100 text-sm">O script está pronto para ser executado nas estações.</p>
                                <a id="link-download" href="#" class="inline-block mt-3 bg-white text-emerald-600 px-6 py-2 rounded-lg font-bold hover:bg-emerald-50 transition-all">Baixar Agora</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
